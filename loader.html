<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>股票看盤系統</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080f08;
      color: #7daa7d;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }
    h1 { font-size: 22px; color: #a8c8a8; letter-spacing: 2px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #1a3a1a;
      border-top-color: #4caf50;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 14px; color: #5a8a5a; }
    #hint {
      display: none;
      max-width: 360px;
      font-size: 13px;
      color: #c8a85a;
      text-align: center;
      line-height: 1.6;
    }
    #retryBtn {
      display: none;
      margin-top: 4px;
      padding: 8px 20px;
      font-size: 13px;
      color: #a8c8a8;
      background: #1a3a1a;
      border: 1px solid #4caf50;
      border-radius: 4px;
      cursor: pointer;
    }
    #retryBtn:hover { background: #244a24; }
  </style>
</head>
<body>
  <h1>股票看盤系統</h1>
  <div class="spinner"></div>
  <p id="msg">正在啟動伺服器…</p>
  <p id="hint">
    啟動時間比預期久，可能是伺服器還在安裝相依套件、或啟動失敗了。<br>
    可以檢查有沒有跳出的終端機視窗顯示錯誤訊息，或按下面按鈕重新整理再試一次。
  </p>
  <button id="retryBtn" onclick="location.reload()">重新整理</button>
  <script>
    const TARGET = 'http://127.0.0.1:8008/';
    // 原本失敗時只會無限期遞增秒數重試，永遠不會告訴使用者「可能失敗了」。
    // 逾時後改成顯示明確提示+手動重新整理按鈕，仍然繼續在背景重試(如果
    // 只是伺服器還在慢慢啟動，還是會自動跳轉過去)。
    const FAILURE_HINT_THRESHOLD_SECONDS = 30;
    let n = 0;
    function tryConnect() {
      fetch(TARGET, { mode: 'no-cors' })
        .then(() => { window.location.replace(TARGET); })
        .catch(() => {
          n++;
          document.getElementById('msg').textContent = '啟動中，請稍候… ' + n + 's';
          if (n >= FAILURE_HINT_THRESHOLD_SECONDS) {
            document.getElementById('hint').style.display = 'block';
            document.getElementById('retryBtn').style.display = 'inline-block';
          }
          setTimeout(tryConnect, 1000);
        });
    }
    tryConnect();
  </script>
</body>
</html>
